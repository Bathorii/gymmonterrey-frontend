name: Deploy GymMonterrey to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build GymMonterrey
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_CITY_SLUG: monterrey
          NEXT_PUBLIC_CITY_NAME: Monterrey
          NEXT_PUBLIC_COUNTRY: MX
          NEXT_PUBLIC_LANG: es-MX
          NEXT_PUBLIC_DOMAIN: gymmonterrey.com
          NEXT_PUBLIC_SITE_NAME: GymMonterrey.com
        run: npm run build

      - name: Deploy GymMonterrey
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name gymmonterrey

      - name: IndexNow – Ping Bing
        run: |
          curl -s "https://www.bing.com/indexnow?url=https://gymmonterrey.com/sitemap.xml&key=6d3703f371013b9a7d1ec11cf0d032e0" \
            -o /dev/null -w "IndexNow status: %{http_code}\n"
